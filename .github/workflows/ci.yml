name: CI

on:
  push:
    branches: [main, master]
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  qa:
    name: QA (lint, typecheck, test)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python
        run: uv python install 3.12

      - name: Sync (build extension + install deps)
        run: uv sync

      - name: Lint
        run: uv run ruff check src/ tests/ demos/

      - name: Format check
        run: uv run ruff format --check src/ tests/ demos/

      - name: Type check
        run: uv run mypy src/softcut/__init__.py tests/ --exclude '.venv'

      - name: Test
        run: uv run pytest tests/ -q

  build-smoke:
    name: Build smoke (${{ matrix.os }} / py${{ matrix.python }})
    needs: qa
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.10", "3.14"]
    steps:
      - uses: actions/checkout@v4

      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Set up Python ${{ matrix.python }}
        run: uv python install ${{ matrix.python }}

      - name: Build and install
        run: uv sync

      - name: Test
        run: uv run pytest tests/ -q
